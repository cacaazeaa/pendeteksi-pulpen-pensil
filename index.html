<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        AI Deteksi Pulpen & Pensil
    </title>

    <!-- ONNX Runtime -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <!-- FONT -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #0f172a
            );

            overflow:hidden;

            padding:20px;
        }

        .background-glow{

            position:absolute;

            width:500px;
            height:500px;

            background:#2563eb;

            border-radius:50%;

            filter:blur(120px);

            opacity:0.2;

            top:-150px;
            right:-150px;
        }

        .background-glow2{

            position:absolute;

            width:400px;
            height:400px;

            background:#06b6d4;

            border-radius:50%;

            filter:blur(120px);

            opacity:0.2;

            bottom:-120px;
            left:-120px;
        }

        .card{

            position:relative;

            width:720px;

            background:rgba(15,23,42,0.75);

            backdrop-filter:blur(14px);

            border:1px solid rgba(255,255,255,0.1);

            border-radius:28px;

            padding:30px;

            box-shadow:
            0 20px 50px rgba(0,0,0,0.45);

            text-align:center;

            z-index:10;
        }

        .title{

            font-size:2.4rem;

            font-weight:700;

            color:white;

            margin-bottom:10px;
        }

        .subtitle{

            color:#cbd5e1;

            margin-bottom:25px;

            font-size:1rem;
        }

        .camera-box{

            position:relative;

            width:640px;
            height:480px;

            margin:auto;

            border-radius:22px;

            overflow:hidden;

            border:3px solid rgba(255,255,255,0.12);

            background:black;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.5);
        }

        video,
        canvas{

            position:absolute;

            top:0;
            left:0;

            width:100%;
            height:100%;

            object-fit:cover;
        }

        canvas{
            z-index:2;
            pointer-events:none;
        }

        .controls{

            margin-top:25px;
        }

        #btn-init{

            padding:15px 35px;

            border:none;

            border-radius:14px;

            font-size:1rem;

            font-weight:600;

            cursor:pointer;

            color:white;

            background:
            linear-gradient(
                90deg,
                #2563eb,
                #06b6d4
            );

            transition:0.3s;

            box-shadow:
            0 10px 25px rgba(37,99,235,0.4);
        }

        #btn-init:hover{

            transform:translateY(-3px) scale(1.03);

            box-shadow:
            0 15px 35px rgba(37,99,235,0.55);
        }

        #status{

            margin-top:20px;

            padding:14px;

            border-radius:14px;

            background:rgba(255,255,255,0.06);

            color:#38bdf8;

            font-weight:500;

            border:1px solid rgba(255,255,255,0.08);
        }

        .footer{

            margin-top:20px;

            color:#94a3b8;

            font-size:0.9rem;
        }

        @media(max-width:800px){

            .card{
                width:100%;
                padding:20px;
            }

            .camera-box{
                width:100%;
                height:auto;
                aspect-ratio:4/3;
            }

            .title{
                font-size:1.8rem;
            }
        }

    </style>

</head>

<body>

    <!-- EFFECT -->
    <div class="background-glow"></div>
    <div class="background-glow2"></div>

    <!-- CARD -->
    <div class="card">

        <!-- TITLE -->
        <div class="title">
            ✏️ AI Deteksi Pulpen & Pensil
        </div>

        <!-- SUBTITLE -->
        <div class="subtitle">
            Sistem Object Detection menggunakan
            YOLO + ONNX Runtime Web
            <br>
            Dibuat oleh
            <b>CACA & ZHESEA</b>
        </div>

        <!-- CAMERA -->
        <div class="camera-box">

            <!-- VIDEO -->
            <video
                id="webcam"
                autoplay
                muted
                playsinline>
            </video>

            <!-- OVERLAY -->
            <canvas
                id="overlay"
                width="640"
                height="480">
            </canvas>

        </div>

        <!-- BUTTON -->
        <div class="controls">

            <button id="btn-init">
                AKTIFKAN AI
            </button>

            <div id="status">
                STATUS : MENUNGGU AKTIVASI
            </div>

        </div>

        <!-- HIDDEN PROCESSOR -->
        <canvas
            id="processor"
            width="640"
            height="640"
            style="display:none;">
        </canvas>

        <!-- FOOTER -->
        <div class="footer">
            Real-Time AI Detection • Browser Based
        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script src="app.js"></script>

</body>
</html>
